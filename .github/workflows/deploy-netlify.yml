name: Deploy Frontend to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend-lovable/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-lovable
        run: npm ci --include=dev

      - name: Build frontend
        working-directory: frontend-lovable
        run: npm run build

      - name: Deploy to Netlify
        run: |
          if [ -z "$NETLIFY_SITE_ID" ] || [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::NETLIFY_SITE_ID and NETLIFY_AUTH_TOKEN secrets must be configured in repository settings before deploying."
            exit 1
          fi
          npx netlify-cli deploy --dir frontend-lovable/.output/public --prod --no-build --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
