name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile briefing.py update.py news_connector.py feedback_app.py premium_report.py weekly_digest.py

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend-lovable/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend-lovable ci

      - name: Frontend lint
        run: npm --prefix frontend-lovable run lint -- --max-warnings=1000

      - name: Frontend build
        run: npm --prefix frontend-lovable run build
